<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Dashboard{% endblock %} — CBC Mizzou</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #0a0a0a;
      color: #e5e7eb;
      min-height: 100vh;
      display: flex;
    }

    /* Sidebar */
    .sidebar {
      width: 240px;
      background: #111;
      border-right: 1px solid #1f1f1f;
      padding: 1.5rem 0;
      display: flex;
      flex-direction: column;
      position: fixed;
      top: 0;
      bottom: 0;
      left: 0;
      z-index: 10;
    }
    .sidebar-brand {
      padding: 0 1.25rem 1.5rem;
      border-bottom: 1px solid #1f1f1f;
      margin-bottom: 1rem;
    }
    .sidebar-brand h2 {
      font-size: 1rem;
      font-weight: 700;
    }
    .sidebar-brand h2 span { color: #F1B82D; }
    .sidebar-brand p {
      font-size: 0.6875rem;
      color: #6b7280;
      margin-top: 0.125rem;
    }
    .sidebar-nav { flex: 1; }
    .sidebar-nav a {
      display: flex;
      align-items: center;
      gap: 0.625rem;
      padding: 0.5rem 1.25rem;
      color: #9ca3af;
      text-decoration: none;
      font-size: 0.8125rem;
      font-weight: 500;
      transition: color 0.15s, background 0.15s;
    }
    .sidebar-nav a:hover {
      color: #fff;
      background: rgba(255,255,255,0.04);
    }
    .sidebar-nav a.active {
      color: #F1B82D;
      background: rgba(241, 184, 45, 0.08);
    }
    .sidebar-nav a .nav-icon {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
    }
    .sidebar-footer {
      padding: 1rem 1.25rem 0;
      border-top: 1px solid #1f1f1f;
    }
    .sidebar-footer a {
      display: block;
      color: #6b7280;
      text-decoration: none;
      font-size: 0.8125rem;
      padding: 0.375rem 0;
      transition: color 0.15s;
    }
    .sidebar-footer a:hover { color: #f87171; }

    /* Main */
    .main {
      flex: 1;
      margin-left: 240px;
      padding: 2rem 2.5rem;
    }
    .page-header {
      margin-bottom: 2rem;
    }
    .page-header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #fff;
    }
    .page-header p {
      font-size: 0.875rem;
      color: #6b7280;
      margin-top: 0.25rem;
    }

    /* Cards */
    .stat-cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 1rem;
      margin-bottom: 2rem;
    }
    .stat-card {
      background: #141414;
      border: 1px solid #1f1f1f;
      border-radius: 12px;
      padding: 1.25rem;
    }
    .stat-card .stat-num {
      font-size: 2rem;
      font-weight: 700;
      color: #F1B82D;
    }
    .stat-card .stat-label {
      font-size: 0.8125rem;
      color: #6b7280;
      margin-top: 0.25rem;
    }

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.375rem;
      padding: 0.5rem 1rem;
      border-radius: 8px;
      font-size: 0.8125rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      border: none;
      transition: all 0.15s;
      text-decoration: none;
    }
    .btn-gold {
      background: #F1B82D;
      color: #000;
    }
    .btn-gold:hover { background: #D4A128; }
    .btn-outline {
      background: transparent;
      color: #9ca3af;
      border: 1px solid #2a2a2a;
    }
    .btn-outline:hover {
      color: #fff;
      border-color: #444;
    }
    .btn-danger {
      background: rgba(239, 68, 68, 0.1);
      color: #f87171;
      border: 1px solid rgba(239, 68, 68, 0.2);
    }
    .btn-danger:hover {
      background: rgba(239, 68, 68, 0.2);
    }

    /* Mobile */
    @media (max-width: 768px) {
      .sidebar { width: 100%; position: relative; }
      .main { margin-left: 0; padding: 1.5rem; }
      body { flex-direction: column; }
    }

  </style>
  {% block extra_css %}{% endblock %}
</head>
<body>
  <aside class="sidebar">
    <div class="sidebar-brand">
      <h2><span>CBC</span> Mizzou</h2>
      <p>Exec Dashboard</p>
    </div>
    <nav class="sidebar-nav">
      <a href="{% url 'dashboard:home' %}" class="{% if active_page == 'home' %}active{% endif %}">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Overview
      </a>
      <a href="{% url 'dashboard:gallery' %}" class="{% if active_page == 'gallery' %}active{% endif %}">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        Gallery
      </a>
      <a href="{% url 'dashboard:events' %}" class="{% if active_page == 'events' %}active{% endif %}">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        Events
      </a>
      <a href="{% url 'dashboard:projects' %}" class="{% if active_page == 'projects' %}active{% endif %}">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
        Projects
      </a>
    </nav>
    <div class="sidebar-footer">
      <a href="/" target="_blank">← View Site</a>
      <a href="{% url 'dashboard:logout' %}">Sign Out</a>
    </div>
  </aside>

  <main class="main">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
